name: pnpm cache
description: 'Cache pnpm dependencies'

outputs:
  cache-hit:
    description: 'Whether the cache was a hit or not'
    value: ${{ steps.pnpm_cache_id.outputs.cache-hit }}

runs:
  using: 'composite'
  steps:
    - uses: pnpm/action-setup@v4
      with:
        run_install: false
    - name: Get pnpm store directory
      id: pnpm_store
      shell: bash
      run: echo "store=$(pnpm store path --silent)" >> $GITHUB_OUTPUT
    - uses: actions/cache@v3
      id: pnpm_cache_id
      env:
        cache-name: cache-pnpm-store
      with:
        path: ${{ steps.pnpm_store.outputs.store }}
        key: ${{ runner.os }}-build-${{ env.cache-name }}-${{ hashFiles('**/pnpm-lock.yaml') }}
    - name: Print pnpm_cache_id
      shell: bash
      run: echo '${{ toJSON(steps.pnpm_cache_id.outputs) }}'
